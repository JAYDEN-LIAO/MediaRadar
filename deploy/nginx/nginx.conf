# =============================================================================
# MediaRadar - Main Nginx config (host side, runs ON the server)
# =============================================================================
# This nginx terminates SSL and reverse-proxies into the dockerized backend /
# frontend containers. It is NOT the in-container nginx (see frontend.conf).
#
# Deploy to:  /etc/nginx/nginx.conf
# Include files live in: /etc/nginx/conf.d/*.conf
# =============================================================================

user                 www-data;
worker_processes     auto;
worker_rlimit_nofile 65535;
pid                  /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # ---------- MIME / charset ----------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    charset             utf-8;

    # ---------- Logging ----------
    log_format          main '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time uct="$upstream_connect_time" '
                             'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log          /var/log/nginx/access.log main;
    error_log           /var/log/nginx/error.log warn;

    # ---------- Performance ----------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;
    server_names_hash_bucket_size 128;

    # ---------- File-size limits ----------
    client_max_body_size      50m;
    client_body_buffer_size   128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ---------- Gzip ----------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_disable        "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ---------- Proxy defaults (SSE-friendly) ----------
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        X-Forwarded-Port  $server_port;
    proxy_connect_timeout   30s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
    proxy_redirect          off;
    # SSE: don't buffer streaming responses
    proxy_buffering         off;
    proxy_request_buffering off;

    # ---------- Upstream: Dockerized backend ----------
    # Reachable via the mediaradar-net bridge network (host -> container).
    # We use 127.0.0.1 + published port to avoid docker DNS on the host.
    upstream mediaradar_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream mediaradar_frontend {
        server 127.0.0.1:8080;
        keepalive 16;
    }

    # ---------- Per-site configs ----------
    include /etc/nginx/conf.d/*.conf;
}
