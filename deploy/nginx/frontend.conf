# =============================================================================
# MediaRadar - In-container frontend nginx config
# =============================================================================
# Serves the H5 build output of `frontend/MiniApp` from /usr/share/nginx/html.
# Mounted into the mediaradar-frontend container via docker-compose.
# =============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Larger buffer / send timeout for SPA assets
    client_max_body_size 50m;

    # gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Cache static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
        access_log off;
    }

    # No-cache for index.html (so deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # Hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA fallback -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck endpoint (used by docker)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
