# =============================================================================
# MediaRadar - Per-site nginx config (host side)
# =============================================================================
# - Listens 80  -> 301 redirect to https
# - Listens 443 -> TLS + reverse proxy /api/ to backend container
#                  and serves the static frontend via the frontend container
#
# SSL certificate paths are placeholders. `scripts/ssl-init.sh` will fetch
# real certs from Let's Encrypt and write them to /etc/letsencrypt/live/<DOMAIN>/.
# =============================================================================

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Allow Let's Encrypt http-01 challenges to land here
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS main site ----------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name _;

    # SSL certificate paths (will exist after ssl-init.sh runs)
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Modern TLS configuration (Mozilla intermediate)
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;
    ssl_stapling            on;
    ssl_stapling_verify     on;
    resolver                1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout        5s;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"          always;
    add_header X-Content-Type-Options   "nosniff"             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP: allow inline scripts (uni-app H5 needs this); tighten as needed
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Hidden files / dotfiles -> deny
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # API: reverse proxy to FastAPI backend
    # ========================================================================
    location /api/ {
        proxy_pass http://mediaradar_backend;

        # SSE / streaming: keep buffer off, long timeouts
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection           "";
        proxy_set_header        Host                 $host;
        proxy_set_header        X-Real-IP            $remote_addr;
        proxy_set_header        X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto    $scheme;
        proxy_http_version      1.1;
        chunked_transfer_encoding on;

        # Long timeouts for LLM streaming responses (SSE can last minutes)
        proxy_connect_timeout   30s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
    }

    # FastAPI OpenAPI docs (optional; remove for stricter prod)
    location ~ ^/(openapi\.json|docs|redoc) {
        proxy_pass http://mediaradar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # Static frontend: delegate to the frontend nginx container
    # ========================================================================
    location / {
        proxy_pass         http://mediaradar_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # Custom 50x
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
